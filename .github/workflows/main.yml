name: Servidor GM - Spider Crawler Autônomo

on:
  workflow_dispatch:
    inputs:
      url_inicial:
        description: 'URL de largada para o Spider:'
        required: true
        default: 'https://example.com'
        type: string
      max_paginas:
        description: 'Limite de páginas:'
        required: true
        default: '15'
        type: string

jobs:
  crawler-service:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Baixar motor de busca do repositório
      uses: actions/checkout@v4

    - name: Inicializar ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp beautifulsoup4

    - name: Executar Spider Rastreamento
      env:
        URL_INICIAL: ${{ github.event.inputs.url_inicial }}
        MAX_PAGINAS: ${{ github.event.inputs.max_paginas }}
      run: python robo.py

    - name: Salvar e publicar resultados no Pages
      run: |
        git config --global user.name "GM Robot Service"
        git config --global user.email "robo@gmcorporation.com.br"
        git add resultados.json || true
        git commit -m "data: atualizando indices do motor de busca [skip ci]" || true
        git push
