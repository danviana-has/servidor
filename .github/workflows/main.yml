name: Servidor GM - Spider Crawler Autônomo

on:
  issues:
    types: [opened]

jobs:
  crawler-service:
    # Só roda se a issue começar com o comando operativo [CRAWLER]
    if: startsWith(github.event.issue.title, '[CRAWLER]')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    steps:
    - name: Baixar motor de busca do repositório
      uses: actions/checkout@v4

    - name: Extrair URL do título da Issue
      id: extrair_url
      run: |
        # O título vem como "[CRAWLER] https://exemplo.com"
        TITULO="${{ github.event.issue.title }}"
        URL_MINERAR=$(echo "$TITULO" | sed 's/\[CRAWLER\] //')
        echo "ALVO_EXTRAIDO=$URL_MINERAR" >> $GITHUB_ENV
        echo "Iniciando varredura no alvo: $URL_MINERAR"

    - name: Inicializar ambiente Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp beautifulsoup4

    - name: Executar Spider Rastreamento
      env:
        URL_INICIAL: ${{ env.ALVO_EXTRAIDO }}
        MAX_PAGINAS: '15'
      run: python robo.py

    - name: Salvar e publicar resultados no repositório
      run: |
        git config --global user.name "GM Robot Service"
        git config --global user.email "robo@gmcorporation.com.br"
        git add resultados.json || true
        git commit -m "data: atualizando indices do motor de busca [skip ci]" || true
        git push

    - name: Fechar e Concluir a Issue automaticamente
      uses: peter-evans/close-issue@v3
      with:
        comment: "O Motor de busca GM processou com sucesso os índices para o alvo solicitado."
