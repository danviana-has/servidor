name: Executar Spider Crawler GM

on:
  workflow_dispatch:
    inputs:
      url_inicial:
        description: 'URL inicial para o Spider começar o crawling:'
        required: true
        default: 'https://example.com'
        type: string
      max_paginas:
        description: 'Limite máximo de páginas para indexar nesta rodada:'
        required: true
        default: '15'
        type: string

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências leves
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp beautifulsoup4

    - name: Executar Spider Crawler
      env:
        URL_INICIAL: ${{ github.event.inputs.url_inicial }}
        MAX_PAGINAS: ${{ github.event.inputs.max_paginas }}
      run: python robo.py
